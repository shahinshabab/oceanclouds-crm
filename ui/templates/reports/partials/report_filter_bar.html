{# reports/partials/report_filter_bar.html #}

<div class="d-flex justify-content-between align-items-start mb-3">
  <div>
    <a href="{{ pdf_download_url }}" class="btn btn-outline-danger btn-sm">
      <i class="bi bi-file-earmark-pdf"></i>
      Download PDF
    </a>
  </div>

  <div class="text-end">
    <h2 class="fw-semibold mb-1">{{ report_title }}</h2>
    <div class="text-muted small">
      {{ date_from }} to {{ date_to }}
    </div>
  </div>
</div>

<form method="get" class="card shadow-sm border-0 mb-4">
  <div class="card-body">
    <div class="row g-2 align-items-end">

      <div class="col-md-4">
        <label class="form-label small text-muted mb-1">{{ user_label }}</label>
        <select name="user" class="form-select form-select-sm">
          <option value="">All</option>

          {% for person in user_options %}
            <option value="{{ person.id }}"
              {% if selected_user and selected_user.id == person.id %}selected{% endif %}>
              {{ person.get_full_name|default:person.username }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-3">
        <label class="form-label small text-muted mb-1">From Date</label>
        <input
          type="date"
          name="date_from"
          value="{{ date_from|date:'Y-m-d' }}"
          class="form-control form-control-sm"
        >
      </div>

      <div class="col-md-3">
        <label class="form-label small text-muted mb-1">To Date</label>
        <input
          type="date"
          name="date_to"
          value="{{ date_to|date:'Y-m-d' }}"
          class="form-control form-control-sm"
        >
      </div>

      <div class="col-md-2 d-grid">
        <button type="submit" class="btn btn-primary btn-sm">
          Apply
        </button>
      </div>

    </div>
  </div>
</form>
