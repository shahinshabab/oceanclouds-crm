<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ report_title }}</title>

  <style>
    @page {
      size: A4;
      margin: 18mm;
    }

    body {
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: #222;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 4px 0;
      text-align: right;
    }

    .meta {
      text-align: right;
      color: #666;
      margin-bottom: 20px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .card {
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 6px;
    }

    .label {
      color: #666;
      font-size: 11px;
      margin-bottom: 4px;
    }

    .value {
      font-size: 16px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f3f3f3;
    }

    .section-title {
      font-size: 15px;
      font-weight: bold;
      margin-top: 18px;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

  {% block pdf_content %}{% endblock %}

</body>
</html>
